name: Auto Absen STIKOM - Jadwal Terbaru (2x per Matkul)

on:
  schedule:
    # Selasa - APSI (09:00 & 11:30 WIB)
    - cron: '55 1 * * 2'   # 08:55 WIB (run pertama APSI)
    - cron: '25 4 * * 2'   # 11:25 WIB (run kedua APSI)

    # Selasa - Metode Numerik (11:30 & 14:00 WIB)
    - cron: '25 4 * * 2'   # 11:25 WIB (run pertama Metode Numerik)
    - cron: '55 6 * * 2'   # 13:55 WIB (run kedua Metode Numerik)

    # Selasa - Microcontroller (14:00 & 16:30 WIB)
    - cron: '55 6 * * 2'   # 13:55 WIB (run pertama Microcontroller)
    - cron: '25 9 * * 2'   # 16:25 WIB (run kedua Microcontroller)

    # Rabu - Jaringan Komputer (09:00 & 11:30 WIB)
    - cron: '55 1 * * 3'   # 08:55 WIB (run pertama)
    - cron: '25 4 * * 3'   # 11:25 WIB (run kedua)

    # Rabu - Sistem Operasi (14:00 & 15:40 WIB)
    - cron: '55 6 * * 3'   # 13:55 WIB (run pertama)
    - cron: '35 8 * * 3'   # 15:35 WIB (run kedua)

    # Sabtu - Pemrograman Web (11:30 & 14:00 WIB)
    - cron: '25 4 * * 6'   # 11:25 WIB (run pertama)
    - cron: '55 6 * * 6'   # 13:55 WIB (run kedua)

    # Sabtu - Kecerdasan Buatan (14:00 & 16:30 WIB)
    - cron: '55 6 * * 6'   # 13:55 WIB (run pertama)
    - cron: '25 9 * * 6'   # 16:25 WIB (run kedua)

  workflow_dispatch:
    inputs:
      class_name:
        description: 'Nama Mata Kuliah (untuk test manual)'
        required: true
        default: 'Metode Numerik'

jobs:
  absen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          pip install selenium webdriver-manager requests
      
      - name: Tentukan Nama Mata Kuliah
        id: class
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          case "$SCHEDULE" in
            "55 1 * * 2"|"25 4 * * 2") CLASS="APSI (Analisa&Perancangan Sistem)" ;;
            "25 4 * * 2"|"55 6 * * 2") CLASS="Metode Numerik" ;;
            "55 6 * * 2"|"25 9 * * 2") CLASS="Microcontroller" ;;
            "55 1 * * 3"|"25 4 * * 3") CLASS="Jaringan Komputer" ;;
            "55 6 * * 3"|"35 8 * * 3") CLASS="Sistem Operasi" ;;
            "25 4 * * 6"|"55 6 * * 6") CLASS="Pemrograman Web" ;;
            "55 6 * * 6"|"25 9 * * 6") CLASS="Kecerdasan Buatan" ;;
            *) CLASS="${{ inputs.class_name }}" ;;
          esac
          echo "CLASS=$CLASS" >> $GITHUB_OUTPUT
      
      - name: Jalankan Auto Absen
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python auto_absen.py "${{ steps.class.outputs.CLASS }}"
