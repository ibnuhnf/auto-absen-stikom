name: Auto Absen STIKOM - Jadwal Terbaru

on:
  schedule:
    - cron: '55 0 * * 2'   # Selasa 07:55 WIB → APSI
    - cron: '25 3 * * 2'   # Selasa 10:25 WIB → Metode Numerik
    - cron: '55 5 * * 2'   # Selasa 12:55 WIB → Microcontroller
    - cron: '55 0 * * 3'   # Rabu 07:55 WIB → Jaringan Komputer
    - cron: '55 5 * * 3'   # Rabu 12:55 WIB → Sistem Operasi
    - cron: '25 3 * * 6'   # Sabtu 10:25 WIB → Pemrograman Web
    - cron: '55 5 * * 6'   # Sabtu 12:55 WIB → Kecerdasan Buatan
  workflow_dispatch:   # Bisa dijalankan manual kapan saja

jobs:
  absen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          pip install selenium webdriver-manager requests
      
      - name: Run Auto Absen
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [[ "${{ github.event.schedule }}" == "55 0 * * 2" ]]; then
            CLASS="APSI (Analisa&Perancangan Sistem)"
          elif [[ "${{ github.event.schedule }}" == "25 3 * * 2" ]]; then
            CLASS="Metode Numerik"
          elif [[ "${{ github.event.schedule }}" == "55 5 * * 2" ]]; then
            CLASS="Microcontroller"
          elif [[ "${{ github.event.schedule }}" == "55 0 * * 3" ]]; then
            CLASS="Jaringan Komputer"
          elif [[ "${{ github.event.schedule }}" == "55 5 * * 3" ]]; then
            CLASS="Sistem Operasi"
          elif [[ "${{ github.event.schedule }}" == "25 3 * * 6" ]]; then
            CLASS="Pemrograman Web"
          elif [[ "${{ github.event.schedule }}" == "55 5 * * 6" ]]; then
            CLASS="Kecerdasan Buatan"
          else
            CLASS="Metode Numerik"
          fi
          python auto_absen.py "$CLASS"
