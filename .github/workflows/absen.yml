name: Auto Absen STIKOM - Jadwal + Re-run 5 Jam Kemudian

on:
  schedule:
    # === SELASA ===
    - cron: '55 0 * * 2'   # 07:55 WIB - APSI (run pertama)
    - cron: '55 5 * * 2'   # 12:55 WIB - APSI (run ulang +5 jam)

    - cron: '25 3 * * 2'   # 10:25 WIB - Metode Numerik (run pertama)
    - cron: '25 8 * * 2'   # 15:25 WIB - Metode Numerik (run ulang +5 jam)

    - cron: '55 5 * * 2'   # 12:55 WIB - Microcontroller (run pertama)
    - cron: '55 10 * * 2'  # 17:55 WIB - Microcontroller (run ulang +5 jam)

    # === RABU ===
    - cron: '55 0 * * 3'   # 07:55 WIB - Jaringan Komputer (run pertama)
    - cron: '55 5 * * 3'   # 12:55 WIB - Jaringan Komputer (run ulang +5 jam)

    - cron: '55 5 * * 3'   # 12:55 WIB - Sistem Operasi (run pertama)
    - cron: '55 10 * * 3'  # 17:55 WIB - Sistem Operasi (run ulang +5 jam)

    # === SABTU ===
    - cron: '25 3 * * 6'   # 10:25 WIB - Pemrograman Web (run pertama)
    - cron: '25 8 * * 6'   # 15:25 WIB - Pemrograman Web (run ulang +5 jam)

    - cron: '55 5 * * 6'   # 12:55 WIB - Kecerdasan Buatan (run pertama)
    - cron: '55 10 * * 6'  # 17:55 WIB - Kecerdasan Buatan (run ulang +5 jam)

  workflow_dispatch:
    inputs:
      class_name:
        description: 'Nama Mata Kuliah (untuk test manual)'
        required: true
        default: 'Metode Numerik'

jobs:
  absen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          pip install selenium webdriver-manager requests
      
      - name: Tentukan Nama Mata Kuliah
        id: class
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          case "$SCHEDULE" in
            "55 0 * * 2"|"55 5 * * 2") CLASS="APSI (Analisa&Perancangan Sistem)" ;;
            "25 3 * * 2"|"25 8 * * 2") CLASS="Metode Numerik" ;;
            "55 5 * * 2"|"55 10 * * 2") CLASS="Microcontroller" ;;
            "55 0 * * 3"|"55 5 * * 3") CLASS="Jaringan Komputer" ;;
            "55 5 * * 3"|"55 10 * * 3") CLASS="Sistem Operasi" ;;
            "25 3 * * 6"|"25 8 * * 6") CLASS="Pemrograman Web" ;;
            "55 5 * * 6"|"55 10 * * 6") CLASS="Kecerdasan Buatan" ;;
            *) CLASS="${{ inputs.class_name }}" ;;
          esac
          echo "CLASS=$CLASS" >> $GITHUB_OUTPUT
      
      - name: Jalankan Auto Absen
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python auto_absen.py "${{ steps.class.outputs.CLASS }}"
